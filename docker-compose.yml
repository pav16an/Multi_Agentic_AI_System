services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=http://localhost:8501,http://127.0.0.1:8501
      - MAX_FILE_SIZE_MB=10
      - RATE_LIMIT_PER_MIN=60
      - APP_AUTH_TOKEN=
      - REDIS_URL=redis://redis:6379/0
      - ENABLE_CLEANUP_ENDPOINT=false
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "8501:8501"
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://api:8000
      - APP_AUTH_TOKEN=
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  redis_data:
